<!DOCTYPE html>
<html>
<head>
  <title>GigShield</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🚀 GigShield</h1>
    <p>AI-Powered Parametric Insurance for Gig Workers</p>
    <h3>💡 Check real-time risk based on your location</h3>

    <input type="text" id="city" placeholder="Enter your city">

    <select id="plan">
      <option value="basic">Basic (₹50/week)</option>
      <option value="standard">Standard (₹100/week)</option>
      <option value="premium">Premium (₹150/week)</option>
    </select>

    <button onclick="checkRisk()">Check Risk</button>

    <p id="loading"></p>
    <p id="result"></p>
    <p id="fraud"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
